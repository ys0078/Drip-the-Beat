  { code:'DO', name:'Dominican Rep.',     lat:18.7,   lon:-70.2,  continent:'America', rhythm:'Poly' },
  { code:'NZ', name:'New Zealand',        lat:-40.9,  lon:174.9,  continent:'Oceania', rhythm:'Free' },

/* ── Globe constants ── */
const CX = 786, CY = 786, R = 786; /* canvas center, radius */
/* Globe offset on screen: top:-236, left:276 */
const GLOB_SCREEN_X = 276, GLOB_SCREEN_Y = -236;

/* ── Rotation state ── */
/* KR: lat=37.5, lon=127.0 → 구 중앙에 오도록 초기값 설정 */
let rotY = (Math.PI / 2) - (127.0 * Math.PI / 180); /* KR 중앙 정렬 */
let rotX =  (37.5  * Math.PI / 180);
let mouseScreenX = 960, mouseScreenY = 540;
let hoveredCountry = null;

/* ── Filter state ── */
let filterContinent = 'all';
let filterRhythm    = 'all';

/* ── 3D projection ── */
function latLonToXYZ(lat, lon, rotYr, rotXr) {
  const φ = lat * Math.PI / 180;
  const λ = (lon * Math.PI / 180) + rotYr;
  let x = Math.cos(φ) * Math.cos(λ);
  let y = Math.sin(φ);
  let z = Math.cos(φ) * Math.sin(λ);
  /* rotX tilt */
  const y2 =  y * Math.cos(rotXr) - z * Math.sin(rotXr);
  const z2 =  y * Math.sin(rotXr) + z * Math.cos(rotXr);
  return { x, y: y2, z: z2 };
}

function project(x, y, z) {
  return { sx: CX - x * R, sy: CY - y * R, visible: z > 0 };
}

/* ── Draw graticule ── */
const canvas = document.getElementById('globe-canvas');
const ctx    = canvas.getContext('2d');

function drawGlobe() {
  ctx.clearRect(0, 0, 1572, 1572);

  /* graticule: latitude/longitude grid lines */
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 0.8;

  /* longitude lines */
  for (let lon = -180; lon < 180; lon += 30) {
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 2) {
      const {x,y,z} = latLonToXYZ(lat, lon, rotY, rotX);
      const p = project(x, y, z);
      if (!p.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p.sx, p.sy); first = false; }
      else ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }

  /* latitude lines */
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath();
    let first = true;
    for (let lon = -180; lon <= 180; lon += 2) {
      const {x,y,z} = latLonToXYZ(lat, lon, rotY, rotX);
      const p = project(x, y, z);
      if (!p.visible) { first = true; continue; }
      if (first) { ctx.moveTo(p.sx, p.sy); first = false; }
      else ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }

  /* country markers */
  COUNTRIES.forEach(c => {
    const {x,y,z} = latLonToXYZ(c.lat, c.lon, rotY, rotX);
    const p = project(x, y, z);
    if (!p.visible) return;

    const matches =
      (filterContinent === 'all' || c.continent === filterContinent) &&
      (filterRhythm    === 'all' || c.rhythm    === filterRhythm);
    const alpha = matches ? 1 : 0.2;
    const isHov = hoveredCountry && hoveredCountry.code === c.code;

    /* dot */
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, isHov ? 5 : 3.5, 0, Math.PI * 2);
    ctx.fillStyle = isHov ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
    ctx.fill();

    /* label */
    ctx.font = `${isHov ? 600 : 400} 18px "Noto Serif KR", serif`;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillText(c.code, p.sx + 8, p.sy + 6);
  });
}

/* ── DOM refs ── */
const hitarea = document.getElementById('globe-hitarea');
const ptrSvg  = document.getElementById('pointer-svg');
const ptrH    = document.getElementById('ptr-h');
const ptrV    = document.getElementById('ptr-v');
const ptrCirc = document.getElementById('ptr-circle');
const feat1   = document.getElementById('feat1');
const feat2   = document.getElementById('feat2');

/* ── Animation loop ── */
let lastTime = 0;
function loop(ts) {
  lastTime = ts;
  drawGlobe();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ── Drag-to-rotate state ── */
let isDragging   = false;
let dragStartX   = 0, dragStartY = 0;
let rotYStart    = 0, rotXStart  = 0;
const DRAG_SENS  = 0.005;

hitarea.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  rotYStart  = rotY;      rotXStart  = rotX;
  e.preventDefault();
});
window.addEventListener('mousemove', (e) => {
  /* 1920 space */
  mouseScreenX = (e.clientX - (window.innerWidth  - 1920 * currentScale) / 2) / currentScale;
  mouseScreenY = (e.clientY - (window.innerHeight - 1080 * currentScale) / 2) / currentScale;

  if (isDragging) {
    const dx = (e.clientX - dragStartX) / currentScale;
    const dy = (e.clientY - dragStartY) / currentScale;
    rotY = rotYStart + dx * DRAG_SENS;
    rotX = rotXStart + dy * DRAG_SENS;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  }
});
window.addEventListener('mouseup', () => { isDragging = false; });

hitarea.addEventListener('mousemove', (e) => {
  const sx = (e.clientX - (window.innerWidth  - 1920 * currentScale) / 2) / currentScale;
  const sy = (e.clientY - (window.innerHeight - 1080 * currentScale) / 2) / currentScale;

  ptrSvg.style.opacity = '1';
  ptrH.setAttribute('x1', 0);    ptrH.setAttribute('y1', sy);
  ptrH.setAttribute('x2', 1920); ptrH.setAttribute('y2', sy);
  ptrV.setAttribute('x1', sx);   ptrV.setAttribute('y1', 0);
  ptrV.setAttribute('x2', sx);   ptrV.setAttribute('y2', 1080);

  /* find nearest visible country */
  let nearest = null, nearDist = 40;
  COUNTRIES.forEach(c => {
    const matches =
      (filterContinent === 'all' || c.continent === filterContinent) &&
      (filterRhythm    === 'all' || c.rhythm    === filterRhythm);
    if (!matches) return;
    const {x,y,z} = latLonToXYZ(c.lat, c.lon, rotY, rotX);
    if (z <= 0) return;
    const p = project(x, y, z);
    const scx = GLOB_SCREEN_X + p.sx;
    const scy = GLOB_SCREEN_Y + p.sy;
    const d = Math.hypot(sx - scx, sy - scy);
    if (d < nearDist) { nearDist = d; nearest = { ...c, px: scx, py: scy }; }
  });

  hoveredCountry = nearest;

  /* lines + circle: 국가 근처면 해당 위치에 고정 */
  const lineX = nearest ? nearest.px : sx;
  const lineY = nearest ? nearest.py : sy;
  ptrH.setAttribute('x1', 0);      ptrH.setAttribute('y1', lineY);
  ptrH.setAttribute('x2', 1920);   ptrH.setAttribute('y2', lineY);
  ptrV.setAttribute('x1', lineX);  ptrV.setAttribute('y1', 0);
  ptrV.setAttribute('x2', lineX);  ptrV.setAttribute('y2', 1080);
  ptrCirc.setAttribute('cx', lineX);
  ptrCirc.setAttribute('cy', lineY);

  if (nearest) {
    const FILTER_BOTTOM = 70; /* filter 영역 하단 (38+26+6) */
    /* horizontal line y = nearest.py */
    /* feat1(continent): 바로 위, feat2(rhythm): 바로 아래 */
    const f1top = nearest.py - 30; /* line 위 */
    const f2top = nearest.py + 4;  /* line 아래 */

    feat1.style.opacity = '1'; feat2.style.opacity = '1';
    feat1.style.left = '17px'; feat2.style.left = '17px';
    /* filter 영역과 겹치지 않도록 */
    feat1.style.top = Math.max(FILTER_BOTTOM, f1top) + 'px';
    feat2.style.top = Math.max(FILTER_BOTTOM, f2top - 5) + 'px';
    feat1.textContent = nearest.continent;
    feat2.textContent = nearest.rhythm;
  } else {
    hoveredCountry = null;
    feat1.style.opacity = '0'; feat2.style.opacity = '0';
  }
});

hitarea.addEventListener('mouseleave', () => {
  ptrSvg.style.opacity = '0';
  feat1.style.opacity  = '0';
  feat2.style.opacity  = '0';
  hoveredCountry = null;
});

hitarea.addEventListener('click', (e) => {
  const sx = (e.clientX - (window.innerWidth  - 1920 * currentScale) / 2) / currentScale;
  const sy = (e.clientY - (window.innerHeight - 1080 * currentScale) / 2) / currentScale;

  let nearest = null, nearDist = 30;
  COUNTRIES.forEach(c => {
    const {x,y,z} = latLonToXYZ(c.lat, c.lon, rotY, rotX);
    if (z <= 0) return;
    const p = project(x, y, z);
    const scx = GLOB_SCREEN_X + p.sx;
    const scy = GLOB_SCREEN_Y + p.sy;
    const d = Math.hypot(sx - scx, sy - scy);
    if (d < nearDist) { nearDist = d; nearest = c; }
  });

  if (nearest && nearest.code === 'KR') {
    window.location.href = '1.jangdan.html';
  }
});
function setupFilter(containerId, stateKey) {
  document.getElementById(containerId).querySelectorAll('.filter-item').forEach(el => {
    el.addEventListener('click', () => {
      const isActive = el.classList.contains('active');
      document.getElementById(containerId).querySelectorAll('.filter-item').forEach(e => e.classList.remove('active'));
      if (!isActive) {
        el.classList.add('active');
        if (stateKey === 'continent') filterContinent = el.dataset.val;
        else                          filterRhythm    = el.dataset.val;
      } else {
        if (stateKey === 'continent') filterContinent = 'all';
        else                          filterRhythm    = 'all';
      }
    });
  });
}
setupFilter('filter-continent', 'continent');
setupFilter('filter-rhythm',    'rhythm');
