<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagaku - JP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide {
    display: none;
    width: 100%;
    height: 100%;
  }
  .slide.active {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

</style>
</head>
<body>

<div class="slide active"><img src="images/sketch7.png"  alt="slide 1"></div>
<div class="slide">        <img src="images/sketch8.png"  alt="slide 2"></div>
<div class="slide">        <img src="images/sketch9.png"  alt="slide 3"></div>
<div class="slide">        <img src="images/sketch10.png" alt="slide 4"></div>
<div class="slide">        <img src="images/sketch11.png" alt="slide 5"></div>
<div class="slide">        <img src="images/sketch12.png" alt="slide 6"></div>
<div class="slide">        <img src="images/sketch13.png" alt="slide 7"></div>
<div class="slide">        <img src="images/sketch14.png" alt="slide 8"></div>
<div class="slide">        <img src="images/sketch15.png" alt="slide 9"></div>
<div class="slide">        <img src="images/sketch16.png" alt="slide 10"></div>
<div class="slide">        <img src="images/sketch17.png" alt="slide 11"></div>
<div class="slide">        <img src="images/sketch18.png" alt="slide 12"></div>
<div class="slide">        <img src="images/sketch20.png" alt="slide 14"></div>
<div class="slide">        <img src="images/sketch21.png" alt="slide 15"></div>
<div class="slide">        <img src="images/sketch22.png" alt="slide 16"></div>
<div class="slide">        <img src="images/sketch23.png" alt="slide 17"></div>
<div class="slide">        <img src="images/sketch24.png" alt="slide 18"></div>
<div class="slide">        <img src="images/sketch25.png" alt="slide 19"></div>
<div class="slide">        <img src="images/sketch26.png" alt="slide 20"></div>
<div class="slide">        <img src="images/sketch27.png" alt="slide 21"></div>
<div class="slide">        <img src="images/sketch28.png" alt="slide 22"></div>
<div class="slide">        <img src="images/sketch29.png" alt="slide 23"></div>
<div class="slide">        <img src="images/sketch30.png" alt="slide 24"></div>
<div class="slide">        <img src="images/sketch31.png" alt="slide 25"></div>

<script>
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  function show(idx) {
    slides[current].classList.remove('active');
    current = (idx + slides.length) % slides.length;
    slides[current].classList.add('active');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>
</body>
</html>
